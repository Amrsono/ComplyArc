# ============================================
# Cortex AML — Render Blueprint
# Deploy: Render Dashboard → New → Blueprint → Connect Repo
# ============================================

services:
  # ─── FastAPI Backend (Docker) ───────────────
  - type: web
    name: cortex-aml-api
    runtime: docker
    plan: free
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cortex-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"

  # ─── Next.js Frontend (Node) ────────────────
  - type: web
    name: cortex-aml-web
    runtime: node
    plan: free
    buildCommand: cd apps/web && npm install && npm run build
    startCommand: cd apps/web && npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NODE_ENV
        value: production

# ─── Managed PostgreSQL ───────────────────────
databases:
  - name: cortex-db
    plan: free
    databaseName: cortex_aml
    user: cortex
