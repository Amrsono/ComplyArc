version: "3.9"

services:
  # 芒鈥濃偓芒鈥濃偓芒鈥濃偓 PostgreSQL Database 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
  postgres:
    image: postgres:16-alpine
    container_name: complyarc-postgres
    environment:
      POSTGRES_USER: complyarc
      POSTGRES_PASSWORD: complyarc_secret
      POSTGRES_DB: complyarc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U complyarc -d complyarc"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 芒鈥濃偓芒鈥濃偓芒鈥濃偓 Redis Cache & Message Broker 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
  redis:
    image: redis:7-alpine
    container_name: complyarc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 芒鈥濃偓芒鈥濃偓芒鈥濃偓 FastAPI Backend 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: complyarc-api
    environment:
      DATABASE_URL: postgresql+asyncpg://complyarc:complyarc_secret@postgres:5432/complyarc
      DATABASE_URL_SYNC: postgresql://complyarc:complyarc_secret@postgres:5432/complyarc
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-complyarc-dev-secret-key-change-me}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      CORS_ORIGINS: http://localhost:3000
      ENVIRONMENT: production
      DEBUG: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # 芒鈥濃偓芒鈥濃偓芒鈥濃偓 Next.js Frontend 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: complyarc-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

  # 芒鈥濃偓芒鈥濃偓芒鈥濃偓 Celery Worker (Background Tasks) 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: complyarc-worker
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://complyarc:complyarc_secret@postgres:5432/complyarc
      DATABASE_URL_SYNC: postgresql://complyarc:complyarc_secret@postgres:5432/complyarc
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-complyarc-dev-secret-key-change-me}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # 芒鈥濃偓芒鈥濃偓芒鈥濃偓 Celery Beat (Scheduled Tasks) 芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓芒鈥濃偓
  beat:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: complyarc-beat
    command: celery -A app.workers.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://complyarc:complyarc_secret@postgres:5432/complyarc
      DATABASE_URL_SYNC: postgresql://complyarc:complyarc_secret@postgres:5432/complyarc
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
